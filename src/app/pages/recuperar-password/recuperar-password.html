<div class="login-container">
  <div class="gradient-bg">
    <div class="sphere red-sphere"></div>
    <div class="sphere yellow-sphere"></div>
  </div>

  <div class="login-card glass-panel animate-fade-in">
    <div class="login-header">
      <span class="logo-icon">🔑</span>
      <h2>Recuperar Contraseña</h2>
      <p *ngIf="step === 1">Ingresa el correo con el que registraste tu taller.</p>
      <p *ngIf="step === 2">Revisa tu correo y escribe el código de 6 dígitos.</p>
      <p *ngIf="step === 3">Crea una nueva contraseña segura.</p>
    </div>

    <div class="alert error-alert" *ngIf="errorMsg">
      ⚠️ {{ errorMsg }}
    </div>
    
    <div class="alert success-alert" *ngIf="successMsg && step !== 3">
      ✅ {{ successMsg }}
    </div>

    <!-- PASO 1: Pedir Correo -->
    <form *ngIf="step === 1" (submit)="solicitarToken($event)" class="login-form">
      <div class="form-group">
        <label>Correo Electrónico</label>
        <div class="input-wrapper">
          <span class="input-icon">✉️</span>
          <input 
            type="email" 
            name="correo" 
            [(ngModel)]="correo" 
            placeholder="ejemplo@taller.com" 
            required
          >
        </div>
      </div>
      <button type="submit" class="btn btn-primary" [disabled]="loading">
        {{ loading ? 'Enviando...' : 'Recibir Código' }}
      </button>
    </form>

    <!-- PASO 2: Verificar Token -->
    <form *ngIf="step === 2" (submit)="verificarToken($event)" class="login-form">
      <div class="form-group">
        <label>Código de Verificación</label>
        <div class="input-wrapper">
          <span class="input-icon">🔢</span>
          <input 
            type="text" 
            name="token" 
            [(ngModel)]="token" 
            placeholder="123456" 
            maxlength="6"
            required
          >
        </div>
      </div>
      <button type="submit" class="btn btn-primary" [disabled]="loading">
        {{ loading ? 'Verificando...' : 'Validar Código' }}
      </button>
    </form>

    <!-- PASO 3: Nueva Contraseña -->
    <form *ngIf="step === 3" (submit)="cambiarPassword($event)" class="login-form">
      <div class="form-group">
        <label>Nueva Contraseña</label>
        <div class="input-wrapper">
          <span class="input-icon">🔒</span>
          <input 
            type="password" 
            name="nuevaPassword" 
            [(ngModel)]="nuevaPassword" 
            placeholder="••••••••" 
            required
          >
        </div>
      </div>
      <button type="submit" class="btn btn-primary" [disabled]="loading">
        {{ loading ? 'Guardando...' : 'Cambiar Contraseña' }}
      </button>
    </form>

    <div class="login-footer">
      <p><a routerLink="/login">← Volver al inicio de sesión</a></p>
    </div>
  </div>
</div>
